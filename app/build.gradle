plugins { id 'com.android.application' }

android {
    namespace 'com.example.floatinggifoverlay'
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId 'com.example.floatinggifoverlay'
        minSdk 23
        targetSdk 28
        versionCode 1
        versionName '1.0'
    }
}
